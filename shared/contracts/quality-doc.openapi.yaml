openapi: 3.0.3
info:
  title: SCM Quality-Doc Service API
  version: 0.2.0
  description: |
    SCM-211 Quality-Doc MVP 계약 스켈레톤.
    문서 목록/상세/ACK API를 정의한다.
    ACK API는 idempotent(동일 요청 2회 시 동일 결과 반환) 정책을 적용한다.
servers:
  - url: /api/quality-doc

tags:
  - name: QualityDocuments

paths:
  /v1/documents:
    get:
      tags: [QualityDocuments]
      summary: 품질 문서 목록 조회
      operationId: searchQualityDocuments
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, EXPIRED, ARCHIVED]
        - name: keyword
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
      responses:
        '200':
          description: 목록 조회 성공
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityDocumentPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/documents/{documentId}:
    get:
      tags: [QualityDocuments]
      summary: 품질 문서 상세 조회
      operationId: getQualityDocumentById
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 40
      responses:
        '200':
          description: 상세 조회 성공
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityDocumentDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/documents/{documentId}/ack:
    put:
      tags: [QualityDocuments]
      summary: 문서 ACK 처리 (Idempotent)
      description: |
        동일한 ACK 요청(documentId + memberId + ackType)을 2회 이상 호출해도 결과는 동일해야 한다.
        중복 ACK를 생성하지 않고, 동일한 응답 본문을 반환한다.
      operationId: acknowledgeQualityDocument
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 40
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualityDocumentAckRequest'
      responses:
        '200':
          description: ACK 처리 성공(중복 요청 포함)
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityDocumentAckResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    XTraceIdHeader:
      name: X-Trace-Id
      in: header
      required: false
      description: 분산 추적용 traceId. 미전달 시 서버에서 생성한다.
      schema:
        $ref: '#/components/schemas/TraceId'
    XRequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      description: 요청 단위 상관관계 식별자.
      schema:
        type: string
        maxLength: 64
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: ACK 중복 요청 식별 키
      schema:
        type: string
        maxLength: 100
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20

  headers:
    X-Trace-Id:
      description: 서버가 응답에 반환하는 traceId
      schema:
        $ref: '#/components/schemas/TraceId'
    X-Request-Id:
      description: 서버가 응답에 반환하는 requestId
      schema:
        type: string
        maxLength: 64

  schemas:
    TraceId:
      type: string
      example: '31bb20e8-99a6-4d22-96aa-95a626501f84'

    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - UPSTREAM_TIMEOUT
        - DEPENDENCY_FAILED
        - BAD_GATEWAY
        - INTERNAL_ERROR

    FieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
        reason:
          type: string

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
        traceId:
          $ref: '#/components/schemas/TraceId'
        details:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    PageMeta:
      type: object
      required: [page, size, totalElements, totalPages, hasNext]
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        hasNext:
          type: boolean

    QualityDocumentSummary:
      type: object
      required: [documentId, title, status, issuedAt]
      properties:
        documentId:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [ACTIVE, EXPIRED, ARCHIVED]
        issuedAt:
          type: string
          format: date-time

    QualityDocumentDetail:
      allOf:
        - $ref: '#/components/schemas/QualityDocumentSummary'
        - type: object
          properties:
            contentUrl:
              type: string
              format: uri
            version:
              type: string
            requiresAck:
              type: boolean

    QualityDocumentPageResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/QualityDocumentSummary'
        page:
          $ref: '#/components/schemas/PageMeta'

    QualityDocumentAckRequest:
      type: object
      required: [memberId, ackType]
      properties:
        memberId:
          type: string
          maxLength: 40
        ackType:
          type: string
          enum: [READ, CONFIRMED]
        comment:
          type: string
          maxLength: 500

    QualityDocumentAckResponse:
      type: object
      required: [documentId, memberId, ackType, acknowledged, acknowledgedAt]
      properties:
        documentId:
          type: string
        memberId:
          type: string
        ackType:
          type: string
        acknowledged:
          type: boolean
        acknowledgedAt:
          type: string
          format: date-time
        duplicateRequest:
          type: boolean
          description: 동일 요청 재호출 여부

  responses:
    BadRequest:
      description: 요청 값 검증 실패 (VALIDATION_ERROR)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 실패 (UNAUTHORIZED)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스를 찾을 수 없음 (NOT_FOUND)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: ACK 처리 충돌 또는 상태 충돌 (CONFLICT)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamTimeout:
      description: 상위/의존 시스템 타임아웃 (UPSTREAM_TIMEOUT)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 서버 내부 오류 (INTERNAL_ERROR)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# TODO: 팀 확정 필요 항목
# - ACK idempotency 키 조합(documentId/memberId/ackType + Idempotency-Key) 확정
# - ACK 중복 요청 시 duplicateRequest 플래그/응답 필드 유지 정책 확정
# - 문서 상태가 EXPIRED/ARCHIVED일 때 ACK 허용 여부(409 vs 200) 확정
# - ACK 감사로그 보존 기간 및 추적 키 정책 확정

