openapi: 3.0.3
info:
  title: SCM Board Service API
  version: 0.2.0
  description: |
    SCM-211 Board MVP 계약 스켈레톤.
    게시글 목록/상세/작성 API를 정의하며, 첨부는 file 서비스 참조(fileId)로 모델링한다.
servers:
  - url: /api/board

tags:
  - name: Board

paths:
  /v1/posts:
    get:
      tags: [Board]
      summary: 게시글 목록 조회
      operationId: searchBoardPosts
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: boardType
          in: query
          required: false
          schema:
            type: string
            enum: [NOTICE, GENERAL, QUALITY]
        - name: keyword
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
      responses:
        '200':
          description: 목록 조회 성공
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Board]
      summary: 게시글 작성
      description: |
        게시글을 작성한다.
        첨부는 file 서비스의 fileId 배열로 참조한다.
        권한 부족은 403(FORBIDDEN)로 응답한다.
        첨부 검증 실패/의존성 실패는 424(DEPENDENCY_FAILED), 첨부 서비스 장애는 502(BAD_GATEWAY)로 응답한다.
      operationId: createBoardPost
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreateRequest'
      responses:
        '201':
          description: 작성 성공
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '424':
          $ref: '#/components/responses/FailedDependency'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/posts/{postId}:
    get:
      tags: [Board]
      summary: 게시글 상세 조회
      operationId: getBoardPostById
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
        - name: postId
          in: path
          required: true
          schema:
            type: string
            maxLength: 40
      responses:
        '200':
          description: 상세 조회 성공
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    XTraceIdHeader:
      name: X-Trace-Id
      in: header
      required: false
      description: 분산 추적용 traceId. 미전달 시 서버에서 생성한다.
      schema:
        $ref: '#/components/schemas/TraceId'
    XRequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      description: 요청 단위 상관관계 식별자.
      schema:
        type: string
        maxLength: 64
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20

  headers:
    X-Trace-Id:
      description: 서버가 응답에 반환하는 traceId
      schema:
        $ref: '#/components/schemas/TraceId'
    X-Request-Id:
      description: 서버가 응답에 반환하는 requestId
      schema:
        type: string
        maxLength: 64

  schemas:
    TraceId:
      type: string
      example: '31bb20e8-99a6-4d22-96aa-95a626501f84'

    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - UPSTREAM_TIMEOUT
        - DEPENDENCY_FAILED
        - BAD_GATEWAY
        - INTERNAL_ERROR

    FieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
        reason:
          type: string

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
        traceId:
          $ref: '#/components/schemas/TraceId'
        details:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    PageMeta:
      type: object
      required: [page, size, totalElements, totalPages, hasNext]
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        hasNext:
          type: boolean

    AttachmentRef:
      type: object
      required: [fileId]
      properties:
        fileId:
          type: string
          description: file 서비스에서 발급한 첨부 식별자
        fileName:
          type: string

    PostSummary:
      type: object
      required: [postId, boardType, title, status, createdBy, createdAt]
      properties:
        postId:
          type: string
        boardType:
          type: string
          enum: [NOTICE, GENERAL, QUALITY]
        title:
          type: string
        status:
          type: string
          enum: [DRAFT, PUBLISHED, CLOSED]
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    PostDetail:
      allOf:
        - $ref: '#/components/schemas/PostSummary'
        - type: object
          properties:
            content:
              type: string
            attachments:
              type: array
              items:
                $ref: '#/components/schemas/AttachmentRef'

    PostPageResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PostSummary'
        page:
          $ref: '#/components/schemas/PageMeta'

    PostCreateRequest:
      type: object
      required: [boardType, title, content, createdBy]
      properties:
        boardType:
          type: string
          enum: [NOTICE, GENERAL, QUALITY]
        title:
          type: string
          maxLength: 200
        content:
          type: string
          maxLength: 10000
        createdBy:
          type: string
          maxLength: 40
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentRef'

    PostCreateResponse:
      type: object
      required: [postId, createdAt]
      properties:
        postId:
          type: string
        createdAt:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: 요청 값 검증 실패 (VALIDATION_ERROR)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 실패 (UNAUTHORIZED)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 권한 부족 (FORBIDDEN)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스를 찾을 수 없음 (NOT_FOUND)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    FailedDependency:
      description: 첨부 참조 검증/의존성 실패 (DEPENDENCY_FAILED)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: 첨부 서비스 장애/비정상 응답 (BAD_GATEWAY)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamTimeout:
      description: 상위/의존 시스템 타임아웃 (UPSTREAM_TIMEOUT)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 서버 내부 오류 (INTERNAL_ERROR)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# TODO: 팀 확정 필요 항목
