openapi: 3.0.3
info:
  title: SCM Report Service API
  version: 0.1.0
  description: Print/report generation contract.
servers:
  - url: /api/report
paths:
  /v1/jobs:
    post:
      summary: Create report job
      operationId: createReportJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportJobCreateRequest"
      responses:
        "201":
          description: Report job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJob"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportError"
  /v1/jobs/{jobId}:
    get:
      summary: Get report job status
      operationId: getReportJobStatus
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJob"
        "400":
          description: Invalid job id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportError"
        "404":
          description: Report job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportError"
components:
  schemas:
    ReportJobCreateRequest:
      type: object
      required: [reportType]
      properties:
        reportType:
          type: string
          maxLength: 50
        requestedByMemberId:
          type: string
          maxLength: 50
    ReportJob:
      type: object
      required: [jobId, reportType, status, requestedAt]
      properties:
        jobId:
          type: string
          format: uuid
        reportType:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED]
        requestedByMemberId:
          type: string
        requestedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        outputFileId:
          type: string
          format: uuid
          nullable: true
        errorMessage:
          type: string
          nullable: true
    ReportError:
      type: object
      required: [code, message, path, timestamp]
      properties:
        code:
          type: string
        message:
          type: string
        path:
          type: string
        timestamp:
          type: string
          format: date-time
