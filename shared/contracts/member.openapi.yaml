openapi: 3.0.3
info:
  title: SCM Member Service API
  version: 0.1.0
  description: Supplier/member lookup and profile management contract.
servers:
  - url: /api/member
paths:
  /v1/members/{memberId}:
    get:
      summary: Get member by id
      operationId: getMemberById
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Member not found
  /v1/members:
    get:
      summary: Search members
      operationId: searchMembers
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
            maxLength: 200
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Search result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchMembersResponse"
        "400":
          description: Invalid query parameter
components:
  schemas:
    Member:
      type: object
      required: [memberId, memberName, status]
      properties:
        memberId:
          type: string
        memberName:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
    SearchMembersResponse:
      type: object
      required: [items, total, page, size]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Member"
        total:
          type: integer
          format: int64
          minimum: 0
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
