openapi: 3.0.3
info:
  title: SCM Order-Lot Service API
  version: 0.2.0
  description: |
    SCM-210 P0 MVP 계약 스켈레톤.
    주문/LOT 핵심 조회와 상태 변경 API를 정의한다.
    Write API(상태 변경)는 자동 재시도(retry) 금지 정책을 적용한다.
servers:
  - url: /api/order-lot

tags:
  - name: Orders
  - name: Lots

paths:
  /v1/orders:
    get:
      tags: [Orders]
      summary: 주문 목록 조회
      operationId: searchOrders
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: supplierId
          in: query
          required: false
          schema:
            type: string
            maxLength: 40
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELED]
        - name: keyword
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
      responses:
        '200':
          description: 주문 목록 조회 성공
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/orders/{orderId}:
    get:
      tags: [Orders]
      summary: 주문 상세 조회
      operationId: getOrderById
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            maxLength: 40
      responses:
        '200':
          description: 주문 상세 조회 성공
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/lots/{lotId}:
    get:
      tags: [Lots]
      summary: LOT 상세 조회
      operationId: getLotById
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
        - name: lotId
          in: path
          required: true
          schema:
            type: string
            maxLength: 40
      responses:
        '200':
          description: LOT 상세 조회 성공
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LotDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/orders/{orderId}/status:
    post:
      tags: [Orders]
      summary: 주문 상태 변경 (Write)
      description: |
        주문 상태를 변경한다.
        Write API 특성상 Gateway/Client 자동 재시도(retry)는 금지한다.
      operationId: changeOrderStatus
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XRequestIdHeader'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            maxLength: 40
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusChangeRequest'
      responses:
        '200':
          description: 상태 변경 성공
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/X-Trace-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatusChangeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    XTraceIdHeader:
      name: X-Trace-Id
      in: header
      required: false
      description: 분산 추적용 traceId. 미전달 시 서버에서 생성한다.
      schema:
        $ref: '#/components/schemas/TraceId'
    XRequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      description: 요청 단위 상관관계 식별자.
      schema:
        type: string
        maxLength: 64
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20

  headers:
    X-Trace-Id:
      description: 서버가 응답에 반환하는 traceId
      schema:
        $ref: '#/components/schemas/TraceId'
    X-Request-Id:
      description: 서버가 응답에 반환하는 requestId
      schema:
        type: string
        maxLength: 64

  schemas:
    TraceId:
      type: string
      description: 요청 추적 식별자
      example: '31bb20e8-99a6-4d22-96aa-95a626501f84'

    ErrorCode:
      type: string
      description: 표준 에러코드 enum
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - UPSTREAM_TIMEOUT
        - DEPENDENCY_FAILED
        - BAD_GATEWAY
        - INTERNAL_ERROR

    FieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
        reason:
          type: string

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
        traceId:
          $ref: '#/components/schemas/TraceId'
        details:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    PageMeta:
      type: object
      required: [page, size, totalElements, totalPages, hasNext]
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        hasNext:
          type: boolean

    OrderSummary:
      type: object
      required: [orderId, supplierId, status, orderedAt]
      properties:
        orderId:
          type: string
        supplierId:
          type: string
        status:
          type: string
          enum: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELED]
        orderedAt:
          type: string
          format: date-time

    OrderPageResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
        page:
          $ref: '#/components/schemas/PageMeta'

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            expectedDeliveryAt:
              type: string
              format: date-time
            totalLotCount:
              type: integer
              format: int32

    LotDetail:
      type: object
      required: [lotId, orderId, quantity, status]
      properties:
        lotId:
          type: string
        orderId:
          type: string
        quantity:
          type: number
          format: double
        status:
          type: string
          enum: [ALLOCATED, IN_PRODUCTION, RELEASED, HOLD]

    OrderStatusChangeRequest:
      type: object
      required: [targetStatus, changedBy]
      properties:
        targetStatus:
          type: string
          enum: [CONFIRMED, IN_PROGRESS, COMPLETED, CANCELED]
        changedBy:
          type: string
          maxLength: 40
        reason:
          type: string
          maxLength: 200

    OrderStatusChangeResponse:
      type: object
      required: [orderId, beforeStatus, afterStatus, changedAt]
      properties:
        orderId:
          type: string
        beforeStatus:
          type: string
        afterStatus:
          type: string
        changedAt:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: 요청 값 검증 실패 (VALIDATION_ERROR)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 실패 (UNAUTHORIZED)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스를 찾을 수 없음 (NOT_FOUND)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 상태 충돌 또는 중복 처리 (CONFLICT)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamTimeout:
      description: 상위/의존 시스템 타임아웃 (UPSTREAM_TIMEOUT)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 서버 내부 오류 (INTERNAL_ERROR)
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/X-Trace-Id'
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# TODO: 팀 확정 필요 항목
# - 주문 상태 전이 허용 규칙(현재 상태 -> 목표 상태) 확정
# - Order/Lot 조회 기본 정렬 기준(createdAt vs updatedAt) 확정
# - Write API 재시도 금지 정책의 Gateway 강제 방식(정책/필터) 확정
# - 504(UPSTREAM_TIMEOUT)와 502(BAD_GATEWAY) 도메인별 구분 기준 확정
