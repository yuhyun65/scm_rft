openapi: 3.0.3
info:
  title: SCM File Service API
  version: 0.1.0
  description: File metadata and attachment handling contract.
servers:
  - url: /api/file
paths:
  /v1/files:
    post:
      summary: Register uploaded file metadata
      operationId: registerFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileRegisterRequest"
      responses:
        "201":
          description: File metadata registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileMetadata"
        "400":
          description: Invalid request payload or metadata policy violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileError"
  /v1/files/{fileId}:
    get:
      summary: Get file metadata
      operationId: getFile
      parameters:
        - in: path
          name: fileId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileMetadata"
        "400":
          description: Invalid fileId format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileError"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileError"
components:
  schemas:
    FileRegisterRequest:
      type: object
      required: [domainKey, originalName, storagePath]
      properties:
        domainKey:
          type: string
          maxLength: 100
        originalName:
          type: string
          maxLength: 255
        storagePath:
          type: string
          maxLength: 500
    FileMetadata:
      type: object
      required: [fileId, domainKey, originalName, storagePath]
      properties:
        fileId:
          type: string
          format: uuid
        domainKey:
          type: string
        originalName:
          type: string
        storagePath:
          type: string
    FileError:
      type: object
      required: [code, message, path, timestamp]
      properties:
        code:
          type: string
        message:
          type: string
        path:
          type: string
        timestamp:
          type: string
          format: date-time
