name: scm-rft-staging

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scm-stg-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "11433:1433"
    volumes:
      - sqlserver-staging-data:/var/opt/mssql
      - ./migration/backups/staging:/var/opt/mssql/backup
    networks:
      - scm-staging-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g

  redis:
    image: redis:7.2-alpine
    container_name: scm-stg-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - redis-staging-data:/data
    networks:
      - scm-staging-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: scm-stg-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-scm_stage}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-scm_stage_1234}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_prometheus return_per_object_metrics true"
    ports:
      - "25673:5672"
      - "35672:15672"
      - "35692:15692"
    volumes:
      - rabbitmq-staging-data:/var/lib/rabbitmq
    networks:
      - scm-staging-net

  loki:
    image: grafana/loki:2.9.8
    container_name: scm-stg-loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "13100:3100"
    volumes:
      - ./infra/observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-staging-data:/loki
    networks:
      - scm-staging-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: scm-stg-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "19090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-staging-data:/prometheus
    networks:
      - scm-staging-net

  tempo:
    image: grafana/tempo:2.6.1
    container_name: scm-stg-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    user: "0:0"
    ports:
      - "13200:3200"
      - "14317:4317"
      - "14318:4318"
    volumes:
      - ./infra/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-staging-data:/var/tempo
    networks:
      - scm-staging-net

  grafana:
    image: grafana/grafana:latest
    container_name: scm-stg-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "13000:3000"
    depends_on:
      - loki
      - prometheus
      - tempo
    volumes:
      - grafana-staging-data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - scm-staging-net

networks:
  scm-staging-net:
    driver: bridge

volumes:
  sqlserver-staging-data:
  redis-staging-data:
  rabbitmq-staging-data:
  loki-staging-data:
  prometheus-staging-data:
  tempo-staging-data:
  grafana-staging-data:
