name: scm-rft-dev

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scm-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./migration/backups:/var/opt/mssql/backup
    networks:
      - scm-net

  redis:
    image: redis:7.2-alpine
    container_name: scm-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - scm-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: scm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-scm}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-scm1234}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_prometheus return_per_object_metrics true"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - scm-net

  loki:
    image: grafana/loki:2.9.8
    container_name: scm-loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./infra/observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - scm-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: scm-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    networks:
      - scm-net

  tempo:
    image: grafana/tempo:2.6.1
    container_name: scm-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    user: "0:0"
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - scm-net

  grafana:
    image: grafana/grafana:latest
    container_name: scm-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "3000:3000"
    depends_on:
      - loki
      - prometheus
      - tempo
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - scm-net

networks:
  scm-net:
    driver: bridge

volumes:
  sqlserver-data:
  redis-data:
  rabbitmq-data:
  loki-data:
  prometheus-data:
  tempo-data:
  grafana-data:
