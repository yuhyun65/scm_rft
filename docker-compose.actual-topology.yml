  inventory:
    image: eclipse-temurin:21-jre
    container_name: inventory
    command: ["java", "-jar", "/app/service.jar", "--spring.profiles.active=prod"]
    env_file:
      - .env.production
    environment:
      SCM_DB_URL: jdbc:sqlserver://sqlserver:1433;databaseName=SCM_RFT_PRODLIKE;encrypt=true;trustServerCertificate=true
      SCM_FLYWAY_ENABLED: "false"
    ports:
