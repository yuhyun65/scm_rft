    container_name: board
    command: ["java", "-jar", "/app/service.jar", "--spring.profiles.active=prod"]
    env_file:
      - .env.production
    environment:
      SCM_DB_URL: jdbc:sqlserver://sqlserver:1433;databaseName=SCM_RFT_PRODLIKE;encrypt=true;trustServerCertificate=true
      SCM_FLYWAY_ENABLED: "false"
      BOARD_FILE_SERVICE_BASE_URL: http://file:8087
    ports:
      - "8083:8083"
    volumes:
      - ./services/board/build/libs/board-0.1.0-SNAPSHOT.jar:/app/service.jar:ro
    depends_on:
      - sqlserver
      - file
    networks:
      - scm-net

