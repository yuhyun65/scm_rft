  gateway:
    image: eclipse-temurin:21-jre
    container_name: gateway
    command: ["java", "-jar", "/app/service.jar", "--spring.profiles.active=prod"]
    env_file:
      - .env.production
    environment:
      GATEWAY_POLICY_PATH: /workspace/${GATEWAY_POLICY_PATH}
      GATEWAY_AUTH_VERIFY_URI: http://auth:8081/api/auth/v1/tokens/verify
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "18080:18080"
    volumes:
      - ./services/gateway/build/libs/gateway-0.1.0-SNAPSHOT.jar:/app/service.jar:ro
      - ./infra/gateway/policies:/workspace/infra/gateway/policies:ro
    depends_on:
      - auth
      - member
      - board
      - quality-doc
      - order-lot
      - inventory
      - file
      - report
      - redis
    networks:
      - scm-net

networks:
  scm-net:
    external: false

