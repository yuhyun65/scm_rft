services:
  auth:
    image: eclipse-temurin:21-jre
    container_name: auth
    command: ["java", "-jar", "/app/service.jar", "--spring.profiles.active=prod"]
    env_file:
      - .env.production
    environment:
      SCM_DB_URL: jdbc:sqlserver://sqlserver:1433;databaseName=SCM_RFT_PRODLIKE;encrypt=true;trustServerCertificate=true
      SCM_FLYWAY_ENABLED: "false"
    ports:
      - "8081:8081"
    volumes:
      - ./services/auth/build/libs/auth-0.1.0-SNAPSHOT.jar:/app/service.jar:ro
    depends_on:
      - sqlserver
    networks:
      - scm-net

  member:
    image: eclipse-temurin:21-jre
    container_name: member
    command: ["java", "-jar", "/app/service.jar", "--spring.profiles.active=prod"]
    env_file:
      - .env.production
    environment:
      SCM_DB_URL: jdbc:sqlserver://sqlserver:1433;databaseName=SCM_RFT_PRODLIKE;encrypt=true;trustServerCertificate=true
      SCM_FLYWAY_ENABLED: "false"
    ports:
      - "8082:8082"
    volumes:
      - ./services/member/build/libs/member-0.1.0-SNAPSHOT.jar:/app/service.jar:ro
    depends_on:
      - sqlserver
    networks:
      - scm-net

  board:
