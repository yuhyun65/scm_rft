groups:
  - name: scm-core-alerts
    rules:
      - alert: SCMServiceDown
        expr: up{job="local-services"} == 0
        for: 2m
        labels:
          severity: critical
          domain: platform
        annotations:
          summary: "SCM service down ({{ $labels.instance }})"
          description: "Scrape target {{ $labels.instance }} has been down for 2 minutes."

      - alert: SCMHigh5xxErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 1)
          ) > 0.005
        for: 5m
        labels:
          severity: warning
          domain: gateway
        annotations:
          summary: "SCM 5xx error rate is high"
          description: "5xx error rate is above 0.5% for 5 minutes."

      - alert: SCMHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 0.35
        for: 10m
        labels:
          severity: warning
          domain: gateway
        annotations:
          summary: "SCM p95 latency high"
          description: "p95 latency is above 350ms for 10 minutes."

      - alert: SCMHighP99Latency
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 0.70
        for: 10m
        labels:
          severity: warning
          domain: gateway
        annotations:
          summary: "SCM p99 latency high"
          description: "p99 latency is above 700ms for 10 minutes."

      - alert: SCMRabbitQueueBacklogHigh
        expr: |
          sum(rabbitmq_queue_messages_ready)
          + sum(rabbitmq_queue_messages_unacked)
          > 1000
        for: 5m
        labels:
          severity: warning
          domain: messaging
        annotations:
          summary: "SCM RabbitMQ backlog high"
          description: "RabbitMQ ready+unacked messages are above 1000 for 5 minutes."
