global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: local-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081
          - host.docker.internal:8082
          - host.docker.internal:8083
          - host.docker.internal:8084
          - host.docker.internal:8085
          - host.docker.internal:8086
          - host.docker.internal:8087
          - host.docker.internal:8088
          - host.docker.internal:18080

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:15692
          - host.docker.internal:35692
