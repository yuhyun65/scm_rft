spring:
  application:
    name: gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 2000
        response-timeout: 5s
      default-filters:
        - PreserveHostHeader

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

gateway:
  policy:
    path: ${GATEWAY_POLICY_PATH:infra/gateway/policies/cutover-isolation.yaml}
  auth:
    verify-uri: ${GATEWAY_AUTH_VERIFY_URI:http://localhost:8081/api/auth/v1/tokens/verify}
    verify-timeout-ms: ${GATEWAY_AUTH_VERIFY_TIMEOUT_MS:1500}
  cutover:
    emergency-stop:
      enabled: ${GATEWAY_EMERGENCY_STOP_ENABLED:false}
      http-status: ${GATEWAY_EMERGENCY_STOP_STATUS:503}
