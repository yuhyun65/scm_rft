spring:
  application:
    name: auth
  datasource:
    url: ${SCM_DB_URL:jdbc:h2:mem:auth;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SCM_DB_USER:sa}
    password: ${SCM_DB_PASSWORD:}
    driver-class-name: ${SCM_DB_DRIVER:org.h2.Driver}
  flyway:
    enabled: ${SCM_FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: ${SCM_FLYWAY_LOCATIONS:filesystem:./migration/flyway}
    table: ${SCM_FLYWAY_TABLE:flyway_schema_history}

scm:
  auth:
    jwt:
      secret: ${SCM_AUTH_JWT_SECRET}
      issuer: ${SCM_AUTH_JWT_ISSUER:scm-auth}
      access-token-expiration-seconds: ${SCM_AUTH_ACCESS_TOKEN_EXP_SECONDS:1800}
    login:
      max-failed-attempts: ${SCM_AUTH_LOGIN_MAX_FAILED_ATTEMPTS:5}
      lock-minutes: ${SCM_AUTH_LOGIN_LOCK_MINUTES:15}

server:
  port: 8081
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
